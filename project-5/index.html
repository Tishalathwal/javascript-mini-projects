<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlimited Colors</title>
    <style>
        p{
            font-size: 30px;
            text-align: center;
        }
        .btns{
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
        }

        button{
            font-size: 20px;
            border-radius: 10px;
            background-color: aliceblue;
        }
    </style>
</head>
<body>
    <p >Start should change the background color every second</p>
    <div class = "btns">
        <button id="start">Start</button>
        <button id="stop">Stop</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
